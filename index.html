========================================================
  GRÆS T-041 — Supabase 統合版
  セットアップ手順：
  1. https://supabase.com でプロジェクト作成（無料）
  2. 下記 SUPABASE_URL と SUPABASE_ANON_KEY を置き換える
  3. Supabase Dashboard > SQL Editor で下記SQLを実行する
  4. Storage > New bucket > "avatars" を作成（public: true）
  5. Storage > New bucket > "round-photos" を作成（public: true）
========================================================

  【Supabase SQL セットアップ】
  
  -- プロフィールテーブル
  CREATE TABLE profiles (
    id UUID REFERENCES auth.users(id) ON DELETE CASCADE PRIMARY KEY,
    name TEXT,
    handle TEXT UNIQUE,
    since TEXT,
    phone TEXT,
    avatar_url TEXT,
    created_at TIMESTAMPTZ DEFAULT NOW()
  );
  ALTER TABLE profiles ENABLE ROW LEVEL SECURITY;
  CREATE POLICY "自分のプロフィールのみ参照" ON profiles FOR SELECT USING (auth.uid() = id);
  CREATE POLICY "自分のプロフィールのみ更新" ON profiles FOR UPDATE USING (auth.uid() = id);
  CREATE POLICY "自分のプロフィールのみ挿入" ON profiles FOR INSERT WITH CHECK (auth.uid() = id);

  -- ラウンドテーブル
  CREATE TABLE rounds (
    id BIGSERIAL PRIMARY KEY,
    user_id UUID REFERENCES auth.users(id) ON DELETE CASCADE NOT NULL,
    date TEXT NOT NULL,
    course TEXT NOT NULL,
    holes INTEGER NOT NULL,
    score_arr INTEGER[] NOT NULL,
    par_arr INTEGER[] NOT NULL,
    photo_url TEXT,
    created_at TIMESTAMPTZ DEFAULT NOW()
  );
  ALTER TABLE rounds ENABLE ROW LEVEL SECURITY;
  CREATE POLICY "自分のラウンドのみ参照" ON rounds FOR SELECT USING (auth.uid() = user_id);
  CREATE POLICY "自分のラウンドのみ挿入" ON rounds FOR INSERT WITH CHECK (auth.uid() = user_id);
  CREATE POLICY "自分のラウンドのみ更新" ON rounds FOR UPDATE USING (auth.uid() = user_id);
  CREATE POLICY "自分のラウンドのみ削除" ON rounds FOR DELETE USING (auth.uid() = user_id);

  -- ユーザー登録時に自動でprofilesレコード作成するトリガー
  CREATE OR REPLACE FUNCTION handle_new_user()
  RETURNS TRIGGER AS $$
  BEGIN
    INSERT INTO profiles (id, name, handle)
    VALUES (NEW.id, NEW.raw_user_meta_data->>'name', NEW.raw_user_meta_data->>'handle');
    RETURN NEW;
  END;
  $$ LANGUAGE plpgsql SECURITY DEFINER;
  CREATE TRIGGER on_auth_user_created
    AFTER INSERT ON auth.users
    FOR EACH ROW EXECUTE FUNCTION handle_new_user();

  【Storage設定】
  - avatars バケット（public）: ユーザーアバター画像
  - round-photos バケット（public）: ラウンド写真
  各バケットのPolicies > New Policy > "Give users access to own folder":
    SELECT, INSERT, UPDATE, DELETE で auth.uid()::text = (storage.foldername(name))[1] を設定

========================================================
-->

/* ===== 同期状態表示 ===== */
function setSyncStatus(state){ /* online | saving | saved | offline */
  const el=document.getElementById('sync-status');
  if(state==='saving') el.innerHTML='<span class="sync-dot" style="background:#F5A800;"></span>保存中';

}

  const el=document.getElementById('toast');
  el.textContent=m;

sb.auth.onAuthStateChange(async (event, session) => {
  if(event==='SIGNED_IN' && session){
    currentUser = session.user;
    await loadProfile();
    await loadRounds();
    document.getElementById('tbar').style.display='grid';
    render();
  } else if(event==='SIGNED_OUT'){
    currentUser=null; profile=null; rounds=[];
    document.getElementById('tbar').style.display='none';
    authScreen='login';
    renderAuth();
  } else if(event==='PASSWORD_RECOVERY'){
    toast('パスワードリセットメールを確認してください');
  }
});

  if(!currentUser) return;
  const {data,error} = await sb.from('profiles').select('*').eq('id',currentUser.id).single();
  if(data) profile=data;
  else profile={id:currentUser.id,name:'',handle:'',since:'',phone:'',avatar_url:null};
}

/* ===== ラウンド読み込み ===== */
async function loadRounds(){
  if(!currentUser) return;
  const {data,error} = await sb.from('rounds')
    .select('*')
    .eq('user_id',currentUser.id)
    .order('created_at',{ascending:false});
  if(data){
    rounds = data.map(r=>({
      id: r.id,

/* ===== 認証処理（Supabase） ===== */
async function doLogin(){
  const email=document.getElementById('l-email')?.value.trim()||'';
  const pw=document.getElementById('l-pw')?.value||'';
  if(!email){showAuthError('メールアドレスを入力してください');return;}
  if(!pw){showAuthError('パスワードを入力してください');return;}
  showLoading('ログイン中...');
  const {data,error} = await sb.auth.signInWithPassword({email,password:pw});
  hideLoading();
  if(error){showAuthError(error.message==='Invalid login credentials'?'メールアドレスまたはパスワードが間違っています':error.message);return;}
  /* onAuthStateChange が処理する */
}

async function doLoginPhone(){
  const rawPhone=document.getElementById('l-phone')?.value.trim()||'';
  if(!rawPhone){showAuthError('電話番号を入力してください');return;}
  const phone='+81'+rawPhone.replace(/^0/,'').replace(/-/g,'');
  showLoading('SMS送信中...');
  const {error} = await sb.auth.signInWithOtp({phone});
  hideLoading();
  if(error){showAuthError(error.message);return;}
  authScreen='otp';
  window._otpPhone=phone;
  renderAuth();
  toast('SMSを送信しました');
}

async function verifyOTP(){
  const code=[0,1,2,3,4,5].map(i=>document.getElementById('o'+i)?.value||'').join('');
  if(code.length<6){showAuthError('6桁のコードを入力してください');return;}
  showLoading('認証中...');
  const {error} = await sb.auth.verifyOtp({phone:window._otpPhone, token:code, type:'sms'});
  hideLoading();
  if(error){showAuthError(error.message);return;}
  /* onAuthStateChange が処理する */
}

async function doRegister(){
  const name=document.getElementById('r-name')?.value.trim()||'';
  const handle=document.getElementById('r-handle')?.value.trim()||'';
  const since=document.getElementById('r-since')?.value.trim()||'';
  const email=document.getElementById('r-email')?.value.trim()||'';
  const phone=document.getElementById('r-phone')?.value.trim()||'';
  const pw=document.getElementById('r-pw')?.value||'';
  const pw2=document.getElementById('r-pw2')?.value||'';
  if(!name){showAuthError('お名前を入力してください');return;}
  if(!email){showAuthError('メールアドレスを入力してください');return;}
  if(pw.length<8){showAuthError('パスワードは8文字以上にしてください');return;}
  if(pw!==pw2){showAuthError('パスワードが一致しません');return;}
  showLoading('アカウント作成中...');
  /* Supabase Auth でユーザー作成 */
  const {data,error} = await sb.auth.signUp({
    email, password:pw,
    options:{data:{name,handle}}
  });
  if(error){hideLoading();showAuthError(error.message);return;}
  /* プロフィールを保存（トリガーで自動作成されるが上書き） */
  if(data.user){
    await sb.from('profiles').upsert({
      id:data.user.id, name, handle:handle||'golf_user',
      since:since||'', phone:phone||''
    });
  }
  hideLoading();
  authScreen='verify-email';
  renderAuth();
}

/* ===== ラウンド保存（Supabase） ===== */
async function saveScoreToSupabase(){
  if(!currentUser) return;
  const d=new Date();
  const dateStr=d.getFullYear()+'/'+(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getDate().toString().padStart(2,'0');
  setSyncStatus('saving');
  /* 写真アップロード */
  let photoUrl=null;
  if(pendingImgFile){
    const ext=pendingImgFile.name.split('.').pop();
    const path=`${currentUser.id}/${Date.now()}.${ext}`;
    const {data:upData,error:upErr} = await sb.storage.from('round-photos').upload(path,pendingImgFile);
    if(!upErr){
      const {data:{publicUrl}} = sb.storage.from('round-photos').getPublicUrl(path);
      photoUrl=publicUrl;
    }
  }
  const {data,error} = await sb.from('rounds').insert({
    user_id: currentUser.id,
    date: dateStr,
    course: courseName||'未設定',
    holes,
    score_arr: scores.slice(0,holes),
    par_arr: pars.slice(0,holes),
    photo_url: photoUrl,
  }).select().single();
  if(error){setSyncStatus('offline');toast('保存に失敗しました',true);return;}
  /* ローカルに追加 */
  rounds.unshift({
    id:data.id,date:dateStr,course:courseName||'未設定',
    holes,img:photoUrl,scoreArr:[...scores.slice(0,holes)],parArr:[...pars.slice(0,holes)],_dbId:data.id
  });
  setSyncStatus('saved');
  setTimeout(()=>setSyncStatus(''),2000);
  setupDone=false;courseName='';holes=18;pars=[...P18];scores=[...P18];pendingImgFile=null;pendingImgPreview=null;
  toast('スコアを保存しました ✓');
  setTimeout(()=>go('home'),600);
}

/* ===== ユーティリティ ===== */
function moveItem(i,dir){const j=i+dir;if(j<0||j>=stampLayout.length)return;[stampLayout[i],stampLayout[j]]=[stampLayout[j],stampLayout[i]];rStamp();}
function toggleVis(i){if(stampLayout[i].required)return;stampLayout[i].vis=!stampLayout[i].vis;rStamp();}
function calcScore(r){return r.scoreArr.reduce((a,b)=>a+b,0);}
function calcPar(r){return r.parArr.reduce((a,b)=>a+b,0);}
function calcDiff(r){return calcScore(r)-calcPar(r);}
function fmtDiff(d){return d===0?'E':(d>0?'+':'')+d;}
function abbr(n){return n.replace(/カントリークラブ/g,'CC').replace(/ゴルフ倶楽部/g,'GC').replace(/ゴルフクラブ/g,'GC').substring(0,14);}
function hdcls(d){if(d<=-4)return'hco';if(d===-3)return'hal';if(d===-2)return'he';if(d===-1)return'hbi';if(d===0)return'hp';if(d===1)return'hbo';if(d===2)return'hw';return'hpl';}
function hdlbl(d){if(d<=-4)return'C';if(d===-3)return'A';if(d===-2)return'E';if(d===-1)return'B';if(d===0)return'P';return'+'+d;}
function dotcls(d){if(d<=-4)return'dco';if(d===-3)return'dal';if(d===-2)return'de';if(d===-1)return'db';if(d===0)return'dp';if(d===1)return'dbo';if(d===2)return'dw';return'dpl';}
function dotlbl(d){return hdlbl(d);}
function sdlbl(d){if(d<=-4)return'C';if(d===-3)return'A';if(d===-2)return'E';if(d===-1)return'B';if(d===0)return'P';return'+'+d;}
function dotColor(d){
  if(d<=-4)return{fill:'rgba(55,138,221,0.75)',text:'#fff'};
  if(d===-3)return{fill:'rgba(127,119,221,0.75)',text:'#fff'};
  if(d===-2)return{fill:'rgba(245,168,0,0.80)',text:'#fff'};
  if(d===-1)return{fill:'rgba(29,184,90,0.80)',text:'#fff'};
  if(d===0) return{fill:'rgba(45,107,20,0.70)',text:'rgba(255,255,255,0.90)'};
  if(d===1) return{fill:'rgba(232,48,48,0.75)',text:'#fff'};
  if(d===2) return{fill:'rgba(160,24,24,0.75)',text:'#fff'};
  return{fill:'rgba(255,255,255,0.18)',text:'rgba(255,255,255,0.70)'};
}
function dotFill(d){return dotColor(d).fill;}
function dotText(d){return dotColor(d).text;}
const ICOPY='<rect x="9" y="9" width="13" height="13" rx="2" stroke="#fff" stroke-width="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" stroke="#fff" stroke-width="2"/>';

function rHome(){

function homeCard(r){
  const score=calcScore(r),diff=calcDiff(r),ds=fmtDiff(diff),dc=diff<0?'#4da829':diff===0?'#3B6D11':diff<=7?'#E24B4A':'#a32d2d';
  const f9=r.scoreArr.slice(0,9),fp=r.parArr.slice(0,9),b9=r.holes===18?r.scoreArr.slice(9):[],bp=r.holes===18?r.parArr.slice(9):[];

function refreshScore(){

}

    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:6px;">
      <div style="background:#f5f5f0;border-radius:8px;padding:7px 8px;text-align:center;"><div style="font-size:7px;color:#999890;margin-bottom:2px;">ラウンド数</div><div style="font-size:18px;font-weight:500;color:#1a1a1a;">${rounds.length}</div></div>
      <div style="background:#f5f5f0;border-radius:8px;padding:7px 8px;text-align:center;"><div style="font-size:7px;color:#999890;margin-bottom:2px;">平均(18H)</div><div style="font-size:18px;font-weight:500;color:#1a1a1a;">${avg18??'-'}</div></div>
      <div style="background:#f5f5f0;border-radius:8px;padding:7px 8px;text-align:center;"><div style="font-size:7px;color:#999890;margin-bottom:2px;">ゴルフ歴</div><div style="font-size:11px;font-weight:500;color:#1a1a1a;margin-top:3px;">${u.since?u.since+'年〜':'-'}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
      <div style="background:#eaf3de;border-radius:8px;padding:7px 8px;text-align:center;border:.5px solid #c0dd97;"><div style="font-size:7px;color:#3B6D11;margin-bottom:2px;">ベスト 18H</div><div style="font-size:20px;font-weight:500;color:#3B6D11;">${best18??'-'}</div></div>
      <div style="background:#eaf3de;border-radius:8px;padding:7px 8px;text-align:center;border:.5px solid #c0dd97;"><div style="font-size:7px;color:#3B6D11;margin-bottom:1px;">ベスト 9H</div><div style="font-size:20px;font-weight:500;color:#3B6D11;">${best9??'-'}</div><div style="font-size:6px;color:#639922;margin-top:2px;">前後半・9H含む</div></div>
    </div>
  </div>
  <div style="background:#fff;margin-top:7px;border-top:.5px solid #eaf3de;border-bottom:.5px solid #eaf3de;">
    <div class="cal-nav"><button class="cal-nav-btn" onclick="calPrev()">&lsaquo;</button><span class="cal-nav-title">${calYear}年 ${mNames[calMonth]} <span style="font-size:8px;color:#999890;font-weight:400;">${roundDays.size}回</span></span><button class="cal-nav-btn" onclick="calNext()">&rsaquo;</button></div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);padding:0 8px 2px;">${calHd}</div>
    <div class="cal-grid">${cells}</div>
    <div style="display:flex;gap:10px;padding:0 12px 6px;align-items:center;">
      <div style="display:flex;align-items:center;gap:4px;"><div style="width:9px;height:9px;border-radius:50%;background:#4da829;"></div><span style="font-size:8px;color:#999890;">ラウンド日</span></div>
      <div style="display:flex;align-items:center;gap:4px;"><div style="width:9px;height:9px;border-radius:50%;border:1.5px solid #3B6D11;"></div><span style="font-size:8px;color:#999890;">今日</span></div>
    </div>
  </div>
  <div style="height:10px;"></div>`;
}
function handleAvatarUpload(e){const file=e.target.files[0];if(file)uploadAvatar(file);}

/* ===== 起動 ===== */
init();
</script>
</body>
</html>
